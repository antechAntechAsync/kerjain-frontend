name: Deploy FE KerjaIn

on: 
  push:
    branches:
      - main

jobs: 
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: fe kerjaIn
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /www/wwwroot/kerjaIn-frontend
            git pull origin main
            ~/.bun/bin/bun run build
            cp -r dist/* ../kerjain.tech/
